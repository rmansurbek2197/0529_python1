<html>
<head>
<title>Kalkulyator</title>
<style>
body {
  font-family: Arial, sans-serif;
}
</style>
</head>
<body>
<h1>Kalkulyator</h1>
<input id="num1" type="number" placeholder="Son 1">
<select id="amal">
  <option value="+">Qo'shish</option>
  <option value="-">Ayirish</option>
  <option value="*">Ko'paytirish</option>
  <option value="/">Bo'lish</option>
</select>
<input id="num2" type="number" placeholder="Son 2">
<button id="hisobla">Hisobla</button>
<p id="natija"></p>
<button id="history">Tarix</button>
<div id="tarix"></div>
<script>
let tarix = [];
document.getElementById('hisobla').addEventListener('click', function() {
  let num1 = parseFloat(document.getElementById('num1').value);
  let num2 = parseFloat(document.getElementById('num2').value);
  let amal = document.getElementById('amal').value;
  let natija;
  if (amal === '+') {
    natija = num1 + num2;
  } else if (amal === '-') {
    natija = num1 - num2;
  } else if (amal === '*') {
    natija = num1 * num2;
  } else if (amal === '/') {
    natija = num1 / num2;
  }
  document.getElementById('natija').innerHTML = 'Natija: ' + natija;
  tarix.push(num1 + ' ' + amal + ' ' + num2 + ' = ' + natija);
});
document.getElementById('history').addEventListener('click', function() {
  let html = '';
  for (let i = 0; i < tarix.length; i++) {
    html += '<p>' + tarix[i] + '</p>';
  }
  document.getElementById('tarix').innerHTML = html;
});
</script>
</body>
</html>
